<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Hotel Mazagan</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">

<div class="login-card">
    <img src="/static/mazagan-logo.png" alt="Mazagan Logo" class="hotel-logo">
    <h1 class="hotel-title">Hotel Mazagan</h1><br><br>

    {% if message %}
        <p class="error-message">{{ message }}</p>
    {% endif %}

    <form method="POST">
    <input type="text" name="identifiant" placeholder="Email ou username">
    <input type="password" name="password" placeholder="Mot de passe">
    <button type="submit">Login</button>
</form>

    <div class="login-links">
        <a href="/sign_in">Create new account</a>
    </div>
</div>

</body>
</html>
